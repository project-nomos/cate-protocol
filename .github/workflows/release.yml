name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Create and push tag (dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          echo "RELEASE_VERSION=v${{ inputs.version }}" >> "$GITHUB_ENV"

      - name: Set version from tag
        if: github.event_name == 'push'
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Set package version
        run: |
          VERSION="${RELEASE_VERSION#v}"
          cd packages/sdk
          npm pkg set version="$VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm typecheck && pnpm lint && pnpm format:check

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # --- Publish to npm ---
      - name: Setup Node.js (npm registry)
        uses: actions/setup-node@v6.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
          scope: "@cate-protocol"

      - name: Publish to npm
        run: |
          cd packages/sdk
          pnpm publish --no-git-checks --access public --provenance || echo "Package version may already exist, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token }}

      # --- Version bump ---
      - name: Update package version in repo
        run: |
          VERSION="${RELEASE_VERSION#v}"
          cd packages/sdk
          npm pkg set version="$VERSION"
          cd ../..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/sdk/package.json
          git commit -m "release: update to v${VERSION}" || true
          git push origin HEAD:main || true
